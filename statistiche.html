<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Statistiche</title>
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#150f0a">
<script src="./theme.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#150f0a;
    --leather:#2a1d14;
    --leather-light:#3a2a1b;
    --brass:#c9a24b;
    --brass-bright:#e8c873;
    --brass-dark:#8c6c2d;
    --sleeve:rgba(255,255,255,0.045);
    --sleeve-border:rgba(232,220,192,0.16);
    --parchment:#e8dcc0;
    --ink:#f1e9d8;
    --ink-dim:#c9bda3;
    --danger:#a24a3c;
    --danger-bright:#c65e4e;
  }
  html[data-theme="light"]{
    --void:#faf5ea;
    --leather:#cdb98f;
    --leather-light:#ddc9a0;
    --brass:#a97a2e;
    --brass-bright:#8a5a1e;
    --brass-dark:#6e4718;
    --sleeve:rgba(0,0,0,0.035);
    --sleeve-border:rgba(60,40,20,0.18);
    --parchment:#fffaf0;
    --ink:#2a1d14;
    --ink-dim:#6b5844;
    --danger:#b0453a;
    --danger-bright:#96382e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, var(--leather-light) 0%, transparent 55%),
      radial-gradient(ellipse at 100% 110%, var(--leather) 0%, transparent 50%),
      var(--void);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    transition:background .2s ease, color .2s ease;
  }
  .brand-title{ font-family:'Cinzel', serif; letter-spacing:0.08em; }

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 10px;
    max-width:900px;margin:0 auto;
  }
  header h1{
    font-size:20px;margin:0;font-weight:700;color:var(--brass-bright);
    text-shadow:0 1px 0 rgba(0,0,0,0.6);
  }
  .theme-toggle{
    background:var(--leather-light);
    border:1px solid var(--sleeve-border);
    color:var(--ink);
    width:34px;height:34px;border-radius:50%;
    font-size:15px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }

  .app-nav{
    max-width:900px;margin:0 auto;
    display:flex;gap:8px;justify-content:center;
    padding:0 18px 14px;
  }
  .nav-pill{
    text-decoration:none;
    font-family:'Space Grotesk', sans-serif;
    font-size:12.5px;font-weight:600;
    color:var(--ink-dim);
    background:rgba(0,0,0,0.18);
    border:1px solid var(--sleeve-border);
    padding:6px 16px;border-radius:20px;
  }
  html[data-theme="light"] .nav-pill{ background:rgba(0,0,0,0.05); }
  .nav-pill.active{ color:var(--void); background:var(--brass); border-color:var(--brass); }

  .wrap{ max-width:700px; margin:0 auto; padding:0 16px 50px; }

  /* ---------- Summary cards ---------- */
  .summary{ display:flex; gap:10px; margin-bottom:18px; }
  .summary-card{
    flex:1;
    background:linear-gradient(155deg, var(--leather-light) 0%, var(--leather) 100%);
    border:1px solid #0f0a06;
    border-radius:14px;
    padding:16px 14px;
    text-align:center;
    box-shadow:0 10px 22px -8px rgba(0,0,0,0.5);
  }
  html[data-theme="light"] .summary-card{
    box-shadow:0 10px 22px -8px rgba(60,40,20,0.25);
  }
  .summary-card .num{
    font-family:'Cinzel', serif;font-size:26px;font-weight:700;
    color:var(--brass-bright);
  }
  .summary-card .lbl{ font-size:11.5px;color:var(--ink-dim);margin-top:4px; }

  /* ---------- Stat panels ---------- */
  .stat-panel{
    background:var(--sleeve);
    border:1px solid var(--sleeve-border);
    border-radius:14px;
    padding:14px;
    margin-bottom:16px;
  }
  .stat-panel h3{
    font-family:'Cinzel', serif;font-size:13px;letter-spacing:0.08em;
    color:var(--brass-bright); margin:0 0 12px;
  }
  .stat-row{
    display:flex;align-items:center;justify-content:space-between;
    background:rgba(0,0,0,0.18);
    border:1px solid var(--sleeve-border);
    border-radius:8px;
    padding:8px 12px;
    margin-bottom:6px;
  }
  html[data-theme="light"] .stat-row{ background:rgba(0,0,0,0.04); }
  .stat-row:last-child{ margin-bottom:0; }
  .stat-row .label{ font-size:13px; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:10px; }
  .stat-row .badge{
    background:var(--brass); color:var(--void);
    font-weight:700; font-size:12px;
    padding:3px 11px; border-radius:12px;
    min-width:26px; text-align:center; flex-shrink:0;
  }
  .empty-hint{ font-size:12.5px;color:var(--ink-dim);opacity:0.75;padding:4px 2px; }

  @media (max-width:480px){
    header h1{ font-size:17px; }
    .summary-card .num{ font-size:21px; }
  }
</style>
</head>
<body>

<header>
  <h1 class="brand-title">📊 Statistiche</h1>
  <button class="theme-toggle" id="themeToggle" title="Cambia tema">🌙</button>
</header>

<nav class="app-nav">
  <a href="./index.html" class="nav-pill">📖 Raccoglitore</a>
  <a href="./buste.html" class="nav-pill">🎁 Buste</a>
  <a href="./statistiche.html" class="nav-pill active">📊 Statistiche</a>
</nav>

<div class="wrap">

  <div class="summary">
    <div class="summary-card">
      <div class="num" id="totalCards">0</div>
      <div class="lbl">carte in raccolta</div>
    </div>
    <div class="summary-card">
      <div class="num" id="totalDetailed">0</div>
      <div class="lbl">con dettagli compilati</div>
    </div>
  </div>

  <div class="stat-panel">
    <h3>Per Piattaforma</h3>
    <div id="platformStats"></div>
  </div>

  <div class="stat-panel">
    <h3>Per Rarità</h3>
    <div id="rarityStats"></div>
  </div>

</div>

<script>
/* ---------------- IndexedDB read (same DB as raccoglitore) ---------------- */
const DB_NAME = 'raccoglitore_db';
const DB_VERSION = 2;
const STORE = 'cards';
const POOL_STORE = 'pack_pool';
const META_KEY = '__meta__pagecount';
let db;

function openDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e)=>{
      const d = e.target.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE);
      if(!d.objectStoreNames.contains(POOL_STORE)) d.createObjectStore(POOL_STORE);
    };
    req.onsuccess = ()=>{ db = req.result; resolve(db); };
    req.onerror = ()=> reject(req.error);
  });
}
function idbAllEntries(){
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const keysReq = store.getAllKeys();
    const valsReq = store.getAll();
    let keys, vals;
    keysReq.onsuccess = ()=>{ keys = keysReq.result; if(vals) resolve({keys, vals}); };
    valsReq.onsuccess = ()=>{ vals = valsReq.result; if(keys) resolve({keys, vals}); };
    tx.onerror = ()=> reject(tx.error);
  });
}

function normalizeCard(raw){
  if(!raw) return null;
  if(typeof raw === 'string') return { image: raw, nome:'', piattaforma:'', rarita:'', curiosita:'' };
  return {
    image: raw.image || '',
    nome: raw.nome || '',
    piattaforma: raw.piattaforma || '',
    rarita: raw.rarita || '',
    curiosita: raw.curiosita || ''
  };
}

function groupCounts(values){
  const map = {};
  values.forEach(v=>{
    const trimmed = (v || '').trim();
    if(!trimmed) return;
    const key = trimmed.toLowerCase();
    if(!map[key]) map[key] = { label: trimmed, count: 0 };
    map[key].count++;
  });
  return Object.values(map).sort((a, b)=> b.count - a.count || a.label.localeCompare(b.label));
}

function renderStatList(containerId, groups){
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  if(groups.length === 0){
    el.innerHTML = '<div class="empty-hint">Nessun dato ancora. Compila questo campo aprendo una carta nel raccoglitore.</div>';
    return;
  }
  groups.forEach(g=>{
    const row = document.createElement('div');
    row.className = 'stat-row';
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = g.label;
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = '×' + g.count;
    row.appendChild(label);
    row.appendChild(badge);
    el.appendChild(row);
  });
}

async function init(){
  await openDB();
  const { keys, vals } = await idbAllEntries();

  let totalCards = 0;
  let totalDetailed = 0;
  const platforms = [];
  const rarities = [];

  keys.forEach((k, i)=>{
    if(k === META_KEY) return;
    const card = normalizeCard(vals[i]);
    if(!card || !card.image) return;
    totalCards++;
    if(card.piattaforma) platforms.push(card.piattaforma);
    if(card.rarita) rarities.push(card.rarita);
    if(card.nome || card.piattaforma || card.rarita || card.curiosita) totalDetailed++;
  });

  document.getElementById('totalCards').textContent = totalCards;
  document.getElementById('totalDetailed').textContent = totalDetailed;

  renderStatList('platformStats', groupCounts(platforms));
  renderStatList('rarityStats', groupCounts(rarities));
}

/* ---------------- Theme toggle ---------------- */
function updateThemeIcon(){
  document.getElementById('themeToggle').textContent = getTheme() === 'dark' ? '🌙' : '☀️';
}
document.getElementById('themeToggle').onclick = ()=>{
  toggleTheme();
  updateThemeIcon();
};
updateThemeIcon();

/* ---------------- Service worker ---------------- */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

init();
</script>
</body>
</html>
